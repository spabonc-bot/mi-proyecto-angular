<div class="contenedor">

  <div class="login-box">

    <h2>Iniciar Sesión</h2>

    <label>Numero de Identificacion</label>
    <input type="text" [(ngModel)]="identificacion">

    <label>Codigo de Acceso</label>
    <input type="password" [(ngModel)]="password">

    <div class="opciones">
      <label>
        <input type="radio" name="rol" value="docente" [(ngModel)]="rol"> Docente
      </label>

      <label>
        <input type="radio" name="rol" value="estudiante" [(ngModel)]="rol"> Estudiante
      </label>
    </div>

    <button type="button" (click)="iniciarSesion()">Iniciar Sesion</button>

    <p class="registro-texto">¿No tienes cuenta?</p>
    <button type="button" (click)="irRegistro()">Registrarse</button>

  </div>

  <p class="qr">Ingresar con QR ></p>

</div>
