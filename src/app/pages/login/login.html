<div class="contenedor">

  <div class="login-box">

    <h2>Iniciar Sesión</h2>

    
    <form autocomplete="off">

      <label>Número de Identificación</label>
      <input
        type="text"
        [(ngModel)]="identificacion"
        name="identificacion_login"
        autocomplete="off"
      >

      <label>Contraseña</label>
      <input
        type="password" [(ngModel)]="password"
        name="password_login"
        autocomplete="new-password"
      >

      <div class="opciones">
        <label>
          <input
            type="radio" name="rol_login" value="docente" [(ngModel)]="rol"
          >
          Docente
        </label>

        <label>
          <input
            type="radio" name="rol_login" value="estudiante" [(ngModel)]="rol"
          >
          Estudiante
        </label>
      </div>

      <button type="button" (click)="iniciarSesion()">Iniciar Sesión</button>

      <p class="registro-texto">¿No tienes cuenta?</p>
      <button type="button" class="btn-secundario" (click)="irRegistro()">Registrarse</button>

    </form>

  </div>

  <p class="qr">Ingresar con QR ></p>

</div>
