<div class="contenedor">

  <div class="register-box">

    <h2>Registro de Estudiante</h2>

    <form autocomplete="off">

      <label>Nombre</label>
      <input
        type="text"
        [(ngModel)]="estudiante.nombre"
        name="nombre_registro"
        autocomplete="off"
        placeholder="Ingrese su nombre"
      >

      <label>Apellido</label>
      <input
        type="text"
        [(ngModel)]="estudiante.apellido"
        name="apellido_registro"
        autocomplete="off"
        placeholder="Ingrese su apellido"
      >

      <label>Número de Identificación</label>
      <input
        type="text"
        [(ngModel)]="estudiante.identificacion"
        name="identificacion_registro"
        autocomplete="off"
        placeholder="Ingrese su identificación"
      >

      <label>Correo</label>
      <input
        type="email"
        [(ngModel)]="estudiante.correo"
        name="correo_registro"
        autocomplete="off"
        placeholder="Ingrese su correo"
      >

      
      <label>Contraseña</label>
      <input
        type="password"
        [(ngModel)]="estudiante.password"
        name="password_registro"
        autocomplete="new-password"
        placeholder="Ingrese una contraseña"
      >

      <div class="botones">
        <button type="button" class="btn-principal" (click)="registrarEstudiante()">Registrarse</button>
        <button type="button" class="btn-secundario" (click)="volverLogin()">Volver al login</button>
      </div>

    </form>

  </div>

</div>
